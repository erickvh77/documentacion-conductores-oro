# Docker Compose — producción (DigitalOcean)
# Uso: docker compose -f docker-compose.prod.yml up -d --build

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: conductores_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Variable POSTGRES_PASSWORD requerida}
      POSTGRES_DB: ${POSTGRES_DB:-conductores_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # En producción NO exponer el puerto al exterior
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conductores_app
    restart: always
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-conductores_db}"
      UPLOAD_TEMP_DIR: "/tmp/conductores-uploads"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_tmp:/tmp/conductores-uploads

  # ─── Nginx reverse proxy con SSL ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: conductores_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - app

  # ─── Certbot (SSL automático) ──────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: conductores_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Renovación manual: docker compose run certbot renew
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  postgres_data:
  uploads_tmp:
  certbot_www:
  certbot_conf:
